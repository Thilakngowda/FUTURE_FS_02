<!DOCTYPE html>
<html>
<head>
<title>LeadFlow CRM</title>
<link rel="stylesheet" href="style.css">

<style>
.hidden{
display:none;
}
</style>

</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-body">

<div class="login-box">
<h2>LeadFlow CRM</h2>

<input id="user" placeholder="Admin Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>


<!-- DASHBOARD PAGE -->
<div id="dashboardPage" class="hidden">

<div class="sidebar">
<h2>LeadFlow CRM</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<h1>Lead Dashboard</h1>

<div class="stats">
Total Leads : <span id="count">0</span>
</div>

<input id="search" placeholder="Search leads..." onkeyup="searchLead()">

<div class="form">

<input id="name" placeholder="Client Name">
<input id="email" placeholder="Email">
<input id="source" placeholder="Lead Source">
<input id="notes" placeholder="Notes / Follow up">

<select id="status">
<option>New</option>
<option>Contacted</option>
<option>Converted</option>
</select>

<button onclick="addLead()">Add Lead</button>

</div>

<table>

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Source</th>
<th>Status</th>
<th>Notes</th>
<th>Action</th>
</tr>
</thead>

<tbody id="leadTable"></tbody>

</table>

</div>

</div>


<script>

function login(){

let user = document.getElementById("user").value
let pass = document.getElementById("pass").value

if(user === "admin" && pass === "admin"){
document.getElementById("loginPage").style.display="none"
document.getElementById("dashboardPage").style.display="block"
}else{
alert("Wrong Login")
}

}

function logout(){

document.getElementById("dashboardPage").style.display="none"
document.getElementById("loginPage").style.display="block"

}

</script>

<script src="script.js"></script>

</body>
</html>
